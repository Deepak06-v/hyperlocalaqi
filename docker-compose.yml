version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: hyperlocal-aqi-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hyperlocal_aqi}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: hyperlocal-aqi-backend
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./ml/artifacts:/app/ml/artifacts

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: hyperlocal-aqi-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
